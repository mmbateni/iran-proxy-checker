name: Iran Network Scan

# Schedule:
#   - ASN discovery runs weekly (Sunday 02:00 UTC)
#   - Proxy scan + R verification runs daily (02:00 UTC Mon-Sat)
#   - Both can be triggered manually via workflow_dispatch
on:
  schedule:
    - cron: "0 2 * * 0"   # Sunday  02:00 UTC -- full ASN discovery
    - cron: "0 2 * * 1-6" # Mon-Sat 02:00 UTC -- proxy scan only
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: false
        default: "full"
        type: choice
        options:
          - full          # ASN discovery + proxy scan + R verify
          - proxy-only    # Re-use committed ASN json, scan + R verify
          - asn-only      # Only refresh ASN/prefix database

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

# -----------------------------------------------------------------------------
# Job 1 - ASN Discovery (weekly or manual full/asn-only)
# -----------------------------------------------------------------------------
  discover:
    name: ASN Discovery
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write

    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 2 * * 0') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.mode != 'proxy-only')

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install aiohttp aiohttp-socks ipaddress

      - name: Run ASN discovery (BGP-only, no proxy scan)
        run: python scan.py --bgp-only --save-intermediates --output merged_routable_asns.json
        env:
          RIPE_ATLAS_API_KEY:   ${{ secrets.RIPE_ATLAS_API_KEY }}
          IPINFO_TOKEN:         ${{ secrets.IPINFO_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Upload ASN artifacts
        uses: actions/upload-artifact@v4
        with:
          name: asn-results-${{ github.run_id }}
          if-no-files-found: ignore
          path: |
            merged_routable_asns.json
            bgp_raw.json
            atlas_raw.json

      - name: Commit updated ASN database
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add merged_routable_asns.json
          [ -f bgp_raw.json ]   && git add bgp_raw.json   || true
          [ -f atlas_raw.json ] && git add atlas_raw.json || true
          git diff --cached --quiet || git commit -m "chore: refresh ASN database $(date -u +'%Y-%m-%d')"
          git stash --include-untracked || true
          git pull --rebase origin main
          git stash pop || true
          git push

# -----------------------------------------------------------------------------
# Job 2 - Proxy Scan (Python)
# -----------------------------------------------------------------------------
  scan:
    name: Proxy Scan
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    needs: [discover]
    if: |
      always() &&
      (github.event_name == 'schedule' ||
       (github.event_name == 'workflow_dispatch' && github.event.inputs.mode != 'asn-only')) &&
      (needs.discover.result == 'success' || needs.discover.result == 'skipped')

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Checkout armenia_v2ray_checker outputs
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.ARMENIA_V2RAY_REPO || format('{0}/armenia_v2ray_checker', github.repository_owner) }}
          path: armenia_v2ray_checker
          sparse-checkout: |
            working_armenia_configs.txt
            working_armenia_configs.json
            armenia_iran_bridge_configs.txt
            armenia_iran_bridge_configs.json
          sparse-checkout-cone-mode: false
          token: ${{ secrets.ARMENIA_REPO_TOKEN || github.token }}
        continue-on-error: true

      - name: Checkout armenia-proxy-checker outputs
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.ARMENIA_PROXY_REPO || format('{0}/armenia-proxy-checker', github.repository_owner) }}
          path: armenia-proxy-checker
          sparse-checkout: |
            working_armenia_proxies.txt
            working_armenia_proxies.json
            armenia_iran_bridge_proxies.txt
            armenia_iran_bridge_proxies.json
          sparse-checkout-cone-mode: false
          token: ${{ secrets.ARMENIA_REPO_TOKEN || github.token }}
        continue-on-error: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install aiohttp aiohttp-socks ipaddress

      - name: Install masscan
        continue-on-error: true   # non-fatal: falls back to async scanner
        run: sudo apt-get update && sudo apt-get install -y masscan

      - name: Run proxy scan (with Armenia-bridge ingestion)
        run: |
          python scan.py \
            --proxy-only \
            --use-masscan \
            --armenia-bridge \
            --europe-bridge \
            --save-intermediates \
            --output merged_routable_asns.json
        env:
          RIPE_ATLAS_API_KEY:   ${{ secrets.RIPE_ATLAS_API_KEY }}
          IPINFO_TOKEN:         ${{ secrets.IPINFO_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ARMENIA_V2RAY_DIR:    armenia_v2ray_checker
          ARMENIA_PROXY_DIR:    armenia-proxy-checker
          BALE_TCP_TIMEOUT:     "5"
          # Skip slow RIPE Stat fetching for EU ASNs - use hardcoded prefixes only.
          # Set to 1 to re-enable live fetching (adds ~30s, wider coverage).
          EU_FETCH_RIPE:        "0"
          EU_PREFIX_CAP:        "20"

      - name: Upload proxy artifacts
        uses: actions/upload-artifact@v4
        with:
          name: proxy-results-${{ github.run_id }}
          if-no-files-found: ignore
          path: |
            working_iran_proxies.txt
            working_iran_proxies.json
            hiddify_iran_proxies.json

      - name: Commit and push proxy results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          [ -f working_iran_proxies.txt ]    && git add working_iran_proxies.txt    || true
          [ -f working_iran_proxies.json ]   && git add working_iran_proxies.json   || true
          [ -f hiddify_iran_proxies.json ]   && git add hiddify_iran_proxies.json   || true
          git diff --cached --quiet || git commit -m "chore: update proxies $(date -u +'%Y-%m-%d')"
          git stash --include-untracked || true
          git pull --rebase origin main
          git stash pop || true
          git push

# -----------------------------------------------------------------------------
# Job 3 - R Verification (new)
# Runs immediately after the Python scan completes.
# Downloads working_iran_proxies.json produced by Job 2, runs test_proxies.R
# (with full 4-tier Bale/HTTPS tunnel testing), then commits the ranked output
# files back to the repo so they are always fresh and available for download.
#
# What gets committed:
#   passing_all_ranked.json      -- all passing proxies, priority-sorted
#   passing_bale_tunnel.json     -- HTTPS-tunnel-working proxies (browser-ready)
#   passing_bale_tunnel.txt      -- plain text version for easy use
#   passing_ir_exit.json         -- confirmed Iranian-exit proxies
#   passing_bale_tunnel_blocked.json -- tunnel works, Bale blocks IP
#   passing_bale_bridge.json     -- HTTP-only bridges
# -----------------------------------------------------------------------------
  verify:
    name: R Verification
    runs-on: ubuntu-latest
    timeout-minutes: 60   # 702 proxies × 3 probes × 5s ÷ 32 workers ≈ 33 min worst-case
    permissions:
      contents: write

    needs: [scan]
    if: |
      always() &&
      needs.scan.result == 'success' &&
      (github.event_name == 'schedule' ||
       (github.event_name == 'workflow_dispatch' && github.event.inputs.mode != 'asn-only'))

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      # Pull the freshly committed working_iran_proxies.json from the scan job
      - name: Pull latest proxy results
        run: |
          git pull --rebase origin main

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.3"

      - name: Install R dependencies
        run: |
          Rscript -e "install.packages(c('jsonlite', 'parallel'), repos='https://cloud.r-project.org')"

      - name: Run R verification (4-tier Bale/HTTPS tunnel test)
        run: |
          Rscript test_proxies.R working_iran_proxies.json \
            --workers 32 \
            --timeout 5
        env:
          # Force output files into the repo root (current working directory).
          # Without this, dirname(normalizePath("working_iran_proxies.json"))
          # resolves to the runner workspace root, which is the same place,
          # but being explicit avoids surprises if the R script is run from
          # a subdirectory.
          R_OUTPUT_DIR: "."

      - name: Upload R verification artifacts
        uses: actions/upload-artifact@v4
        with:
          name: r-verified-${{ github.run_id }}
          if-no-files-found: ignore
          path: |
            passing_all_ranked.json
            passing_all_ranked.txt
            passing_bale_tunnel.json
            passing_bale_tunnel.txt
            passing_bale_tunnel_blocked.json
            passing_bale_tunnel_blocked.txt
            passing_ir_exit.json
            passing_ir_exit.txt
            passing_bale_bridge.json
            passing_bale_bridge.txt

      - name: Commit R-verified proxy rankings
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for f in \
            passing_all_ranked.json      passing_all_ranked.txt \
            passing_bale_tunnel.json     passing_bale_tunnel.txt \
            passing_bale_tunnel_blocked.json passing_bale_tunnel_blocked.txt \
            passing_ir_exit.json         passing_ir_exit.txt \
            passing_bale_bridge.json     passing_bale_bridge.txt; do
            [ -f "$f" ] && git add "$f" || true
          done
          git diff --cached --quiet || git commit -m "chore: R-verified proxy rankings $(date -u +'%Y-%m-%d %H:%M') UTC"
          git stash --include-untracked || true
          git pull --rebase origin main
          git stash pop || true
          git push

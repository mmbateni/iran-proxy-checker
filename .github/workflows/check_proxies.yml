name: Iran Network Scan

# Schedule:
#   - ASN discovery runs weekly (Sunday 02:00 UTC) — APIs are quietest then.
#   - Proxy scan runs daily (02:00 UTC) — reads committed ASN json from repo.
#   - Both can be triggered manually via workflow_dispatch with a mode selector.
on:
  schedule:
    - cron: "0 2 * * 0"   # Sunday  02:00 UTC — full ASN discovery
    - cron: "0 2 * * 1-6" # Mon–Sat 02:00 UTC — proxy scan only
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: false
        default: "full"
        type: choice
        options:
          - full          # ASN discovery + proxy scan
          - proxy-only    # Re-use committed ASN json, only scan proxies
          - asn-only      # Only refresh ASN/prefix database

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

# ─────────────────────────────────────────────────────────────────────────────
# Job 1 – ASN Discovery (weekly or manual full/asn-only)
# ─────────────────────────────────────────────────────────────────────────────
  discover:
    name: ASN Discovery
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write

    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 2 * * 0') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.mode != 'proxy-only')

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install aiohttp aiohttp-socks ipaddress

      - name: Run ASN discovery (BGP-only, no proxy scan)
        run: python scan.py --bgp-only --save-intermediates --output merged_routable_asns.json
        env:
          RIPE_ATLAS_API_KEY:   ${{ secrets.RIPE_ATLAS_API_KEY }}
          IPINFO_TOKEN:         ${{ secrets.IPINFO_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Upload ASN artifacts
        uses: actions/upload-artifact@v4
        with:
          name: asn-results-${{ github.run_id }}
          if-no-files-found: ignore
          path: |
            merged_routable_asns.json
            bgp_raw.json
            atlas_raw.json

      - name: Commit updated ASN database
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add merged_routable_asns.json
          [ -f bgp_raw.json ]   && git add bgp_raw.json   || true
          [ -f atlas_raw.json ] && git add atlas_raw.json || true
          git diff --cached --quiet || git commit -m "chore: refresh ASN database $(date -u +'%Y-%m-%d')"
          git pull --rebase origin main
          git push

# ─────────────────────────────────────────────────────────────────────────────
# Job 2 – Proxy Scan
# Reads:
#   - merged_routable_asns.json from this repo (written by Job 1)
#   - Latest committed output files from both Armenia repos (sparse checkout)
#     These repos run their own independent workflows; we just consume results.
#
# Armenia repo layout expected by scan.py --armenia-bridge:
#   ARMENIA_V2RAY_DIR  = "armenia_v2ray_checker"
#     → working_armenia_configs.json / armenia_iran_bridge_configs.json
#   ARMENIA_PROXY_DIR  = "armenia-proxy-checker"
#     → working_armenia_proxies.json / armenia_iran_bridge_proxies.json
#
# Repo name overrides (Settings → Variables):
#   ARMENIA_V2RAY_REPO  e.g. myorg/armenia_v2ray_checker
#   ARMENIA_PROXY_REPO  e.g. myorg/armenia-proxy-checker
# If private, add a PAT with repo-read scope as secret ARMENIA_REPO_TOKEN.
# ─────────────────────────────────────────────────────────────────────────────
  scan:
    name: Proxy Scan
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    needs: [discover]
    if: |
      always() &&
      (github.event_name == 'schedule' ||
       (github.event_name == 'workflow_dispatch' && github.event.inputs.mode != 'asn-only')) &&
      (needs.discover.result == 'success' || needs.discover.result == 'skipped')

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Checkout armenia_v2ray_checker outputs
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.ARMENIA_V2RAY_REPO || format('{0}/armenia_v2ray_checker', github.repository_owner) }}
          path: armenia_v2ray_checker
          sparse-checkout: |
            working_armenia_configs.txt
            working_armenia_configs.json
            armenia_iran_bridge_configs.txt
            armenia_iran_bridge_configs.json
          sparse-checkout-cone-mode: false
          token: ${{ secrets.ARMENIA_REPO_TOKEN || github.token }}
        continue-on-error: true

      - name: Checkout armenia-proxy-checker outputs
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.ARMENIA_PROXY_REPO || format('{0}/armenia-proxy-checker', github.repository_owner) }}
          path: armenia-proxy-checker
          sparse-checkout: |
            working_armenia_proxies.txt
            working_armenia_proxies.json
            armenia_iran_bridge_proxies.txt
            armenia_iran_bridge_proxies.json
          sparse-checkout-cone-mode: false
          token: ${{ secrets.ARMENIA_REPO_TOKEN || github.token }}
        continue-on-error: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install aiohttp aiohttp-socks ipaddress

      - name: Install masscan
        continue-on-error: true
        run: sudo apt-get update && sudo apt-get install -y masscan

      - name: Run proxy scan (with Armenia-bridge ingestion)
        run: |
          python scan.py \
            --proxy-only \
            --use-masscan \
            --armenia-bridge \
            --save-intermediates \
            --output merged_routable_asns.json
        env:
          RIPE_ATLAS_API_KEY:   ${{ secrets.RIPE_ATLAS_API_KEY }}
          IPINFO_TOKEN:         ${{ secrets.IPINFO_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ARMENIA_V2RAY_DIR:    armenia_v2ray_checker
          ARMENIA_PROXY_DIR:    armenia-proxy-checker

      - name: Upload proxy artifacts
        uses: actions/upload-artifact@v4
        with:
          name: proxy-results-${{ github.run_id }}
          if-no-files-found: ignore
          path: |
            working_iran_proxies.txt
            working_iran_proxies.json
            hiddify_iran_proxies.json

      - name: Commit and push proxy results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          [ -f working_iran_proxies.txt ]  && git add working_iran_proxies.txt  || true
          [ -f working_iran_proxies.json ] && git add working_iran_proxies.json || true
          [ -f hiddify_iran_proxies.json ] && git add hiddify_iran_proxies.json || true
          git diff --cached --quiet || git commit -m "chore: update proxies $(date -u +'%Y-%m-%d')"
          git pull --rebase origin main
          git push

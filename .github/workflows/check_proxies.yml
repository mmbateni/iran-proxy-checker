name: Iran Network Scan

on:
  schedule:
    - cron: "30 20 * * *"   # 20:30 UTC = 00:00 Tehran
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install aiohttp ipaddress
          pip install aiohttp-socks
      - name: Install masscan 
        run: sudo apt-get update && sudo apt-get install -y masscan
      - name: Run scanner
        run: python scan.py --save-intermediates --output merged_routable_asns.json
        env:
          RIPE_ATLAS_API_KEY: ${{ secrets.RIPE_ATLAS_API_KEY }}
          IPINFO_TOKEN: ${{ secrets.IPINFO_TOKEN }}
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: scan-results-${{ github.run_id }}
          path: |
            merged_routable_asns.json
            working_iran_proxies.txt
            working_iran_proxies.json
            hiddify_iran_proxies.json
            atlas_raw.json
            bgp_raw.json
            reverse_raw.json
      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add merged_routable_asns.json working_iran_proxies.* hiddify_iran_proxies.json
          git diff --cached --quiet || git commit -m "chore: update results $(date -u +'%Y-%m-%d')"
          git push
